apiVersion: apps/v1
kind: Deployment
metadata: { name: sanctscan, labels: { app: sanctscan } }
spec:
  replicas: 1
  selector: { matchLabels: { app: sanctscan } }
  template:
    metadata: { labels: { app: sanctscan } }
    spec:
      containers:
        - name: sanctscan
          image: ghcr.io/cognis-digital/sanctscan:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: sanctscan }
spec:
  selector: { app: sanctscan }
  ports: [{ port: 80, targetPort: 8000 }]
